</head>

<body>
    <header>
        <h2>
            <center>
                <font color="green">360 </font>
                <font color="blue">Practo</font>
            </center>
        </h2>
        <nav align="center">
            <a href="index.html">Home</a> |&nbsp;
            <a href="hospital.html">Doctors</a> |
            <a href="fb.html">Feedback</a> |
            <a href="#">Doctor Reg</a> |
            <a href="doctor login.html">Doctor Login</a> |
            <a href="patient registration.html">Patient Reg</a> |
            <a href="patient login.html">Patient Login</a>
        </nav>
    </header>
    <hr>
    <main>
        <form>
            <center>
                <h2>Doctor Registration Form</h2>
            </center>
            <table align="center">
                <tr>
                    <td><label>Name:</label></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><label>Password:</label></td>
                    <td><input type="password"></td>
                </tr>
                <tr>
                    <td><label>Email:</label></td>
                    <td><input type="email"></td>
                </tr>
                <tr>
                    <td><label>Phone Number:</label></td>
                    <td><input type="number"></td>
                </tr>
                <tr>
                    <td><label>Specialization:</label></td>
                    <td><select>
                            <option>Cardiologist</option>
                            <option>Neurologist</option>
                            <option>Dermatologist</option>
                            <option>Radiologists</option>
                            <option>Ophthalmologist</option>
                        </select></td>
                </tr>
                <tr>
                    <td><label>Experience(years)</label></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><label>Gender:</label></td>
                    <td><input type="radio" name="gender">Male
                        <input type="radio" name="gender">Female
                    </td>
                </tr>
                <tr>
                    <td><label>Available Days:</label></td>
                    <td><input type="checkbox">Monday
                        <input type="checkbox">Tuesday
                        <input type="checkbox">Wednesday
                    </td>
                </tr>
                <tr>
                    <td><label>Available Time:</label></td>
                    <td><input type="datetime-local"></td>
                </tr>

                <tr>
                    <td><label>Address:</label></td><br>
                    <td><textarea rows="5" cols="20"></textarea></td>
                </tr>
                <tr>
                    <td><label>Upload Certificate:</label></td>
                    <td><input type="file"></td>
                </tr>
                <tr>
                    <td><input type="submit" value="Register">&nbsp;<input type="submit" value="Clear"></td>

                </tr>
            </table>

        </form>
    </main>
    <br><br><br><br><br><br>
    <hr>
    <footer>
        <center>
            <font size="3px" color="green">copyrighr@360</font>
        </center>
        
    </footer>

</body>

</html>
