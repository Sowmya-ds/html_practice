<body>
    <header>
        <h2>
            <center>
                <font color="green">360 </font>
                <font color="blue">Practo</font>
            </center>
        </h2>
        <nav align="center">
            <a href="index.html">Home</a> |&nbsp;
            <a href="hospital.html">Doctors</a> |
            <a href="fb.html">Feedback</a> |
            <a href="doctor registration.html">Doctor Reg</a> |
            <a href="doctor login.html">Doctor Login</a> |
            <a href="#">Patient Reg</a> |
            <a href="patient login.html">Patient Login</a>
        </nav>
    </header>
    <hr>
    <main>

        <form action="" method="get">
            <center>
                <h2>Patient Registration Form</h2>
            </center>
            <table align="center">
                <tr>
                    <td><label for="id1">Name:</label></td>
                    <td><input type="text" id="id1" name="name"></td>
                </tr>
                <tr>
                    <td><label>Password:</label></td>
                    <td><input type="password"></td>
                </tr>
                <tr>
                    <td><label>Email:</label></td>
                    <td><input type="email"></td>
                </tr>
                <tr>
                    <td><label>Phone Number:</label></td>
                    <td><input type="number"></td>
                </tr>
                <tr>
                    <td><label>Date of Birth:</label></td>
                    <td><input type="date"></td>
                </tr>
                <tr>
                    <td><label>Appointment Date & Time:</label></td>
                    <td><input type="datetime-local"></td>
                </tr>
                <tr>
                    <td><label>Gender:</label></td>
                    <td><input type="radio" name="gender">Male
                        <input type="radio" name="gender">Female
                    </td>
                </tr>
                <tr>
                    <td><label>Disease:</label></td>
                    <td><input type="checkbox">Diabetes
                        <input type="checkbox">BP
                        <input type="checkbox">Heart Problem
                    </td>
                </tr>
                <tr>
                    <td><label>Blood Group:</label></td>
                    <td><select>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>AB+</option>
                            <option>O+</option>
                            <option>O-</option>
                        </select></td>
                </tr>
                <tr>
                    <td><label>Address:</label></td>
                    <td><textarea></textarea></td>
                </tr>
                <tr>
                    <td><label>Upload Report:</label></td>
                    <td><input type="file"></td>
                </tr>
                <tr>
                    <td><input type="submit" value="Register">&nbsp;<input type="submit" value="Clear"></td>

                </tr>
            </table>

        </form>
    </main>
    <br><br><br><br><br><br><br>

    </footer>

</body>
